name: Build FAAM Windows EXE

# Builds the packaged Windows app (FAAM.exe) on a Microsoft-hosted Windows
# runner, so you don't need a Windows machine yourself.
#
# Place this file at your repository root as .github/workflows/build-windows.yml
# (it assumes the FAAM project — winshell.py, app.py, static/ — is at the repo
# root; if FAAM lives in a subfolder, set `working-directory` and the artifact
# `path` accordingly).
#
# Run it from the Actions tab (Run workflow), or it runs automatically on a
# version tag like v1.0.0. The built exe appears as a downloadable artifact.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install pywebview pyinstaller

      - name: Build FAAM.exe
        run: >
          python -m PyInstaller --noconfirm --onefile --noconsole --name FAAM
          --icon FAAM.ico
          --add-data "static;static"
          --add-data "advisers;advisers"
          --add-data "app.py;."
          --hidden-import app
          winshell.py

      - name: Upload FAAM.exe
        uses: actions/upload-artifact@v4
        with:
          name: FAAM-windows
          path: dist/FAAM.exe

      - name: Attach to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FAAM.exe
